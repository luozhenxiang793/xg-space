<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XG-SPACE · 页面未找到</title>
<style>
body {
  margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: #0a0a0f; color: #e0e0f0; font-family: 'Noto Sans SC', sans-serif; text-align: center;
}
a { color: #00f0ff; text-decoration: none; }
a:hover { text-decoration: underline; }
h1 { font-family: 'Orbitron', sans-serif; font-size: 6rem; margin: 0;
  background: linear-gradient(135deg, #00f0ff, #b000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
p { color: #8888aa; margin: 16px 0; }
</style>
</head>
<body>
<div>
  <h1>404</h1>
  <p>这个维度的页面不存在</p>
  <a href="/">← 返回 XG-SPACE</a>
</div>
<script>
// GitHub Pages SPA fallback
(function() {
  var redirect = sessionStorage.redirect;
  delete sessionStorage.redirect;
  if (redirect && redirect !== location.href) history.replaceState(null, null, redirect);
})();
</script>
</body>
